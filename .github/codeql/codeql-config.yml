name: "email-ai-tools CodeQL config"

# Exclude code that is not part of the published library runtime from analysis.
# These paths generate only false-positive noise:
#   - tests and their mock server intentionally use fixed local URLs and
#     simplified handlers that are not production code
#   - examples are standalone usage snippets, not part of the package
paths-ignore:
    - test
    - '**/test/**'
    - examples
